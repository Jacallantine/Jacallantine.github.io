<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>

    <link rel="stylesheet" href="../CSS/main.css">
    <link rel="stylesheet" href="../CSS/calendar.css">
</head>
<body>
    
    
    <div class="calendar">
    <div class="calendar-header">
        <button id="prev-month">❮</button>
        <h2 id="month-year"></h2>
        <button id="next-month">❯</button>
    </div>
    <div class="calendar-days">
        <div class="day">Sun</div>
        <div class="day">Mon</div>
        <div class="day">Tue</div>
        <div class="day">Wed</div>
        <div class="day">Thu</div>
        <div class="day">Fri</div>
        <div class="day">Sat</div>
    </div>
    <div id="calendar-body" class="calendar-body">
        <!-- Dates will be generated here -->
    </div>
    <div id="time-selection" class="time-selection">
        <h3>Available Hours</h3>
        <div id="hours-list"></div>
        <button id = "save-button"><span>SAVE</span></button>
    </div>
</div>
    





                <footer>
                    <p>&copy; 2024 TitleTownCatering | Delicious meals for all occasions!</p>
                </footer>
                

    <script src="../JS/main.js"></script>
    <script src="../JS/calendar.js"></script>
</body>
</html>
